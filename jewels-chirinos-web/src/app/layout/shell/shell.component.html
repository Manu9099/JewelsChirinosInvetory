<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">J</div>

      <div>
        <h2>Jewels</h2>
        <p>Inventory & Sales</p>
      </div>
    </div>

    <nav class="menu">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/products" routerLinkActive="active">Productos</a>
      <a routerLink="/customers" routerLinkActive="active">Clientes</a>
      <a routerLink="/sales" routerLinkActive="active">Ventas</a>
    </nav>

    <div class="sidebar-card">
      <span class="sidebar-card-label">Sistema listo</span>
      <strong>Auth + JWT</strong>
      <p>Ya puedes construir productos, clientes y ventas encima de esta base.</p>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div>
        <h1>Panel de control</h1>
        <span>Gestiona tu joyería de forma simple y clara</span>
      </div>

      <div class="topbar-actions">
        <div class="user-chip" *ngIf="user">
          <div class="avatar">{{ user?.fullName?.[0] || 'U' }}</div>

          <div class="user-meta">
            <strong>{{ user?.fullName }}</strong>
            <small>{{ user?.role }}</small>
          </div>
        </div>

        <button class="app-btn app-btn-primary" (click)="logout()">Salir</button>
      </div>
    </header>

    <main class="page-container">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
